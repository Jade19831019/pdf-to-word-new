<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 转 Word - 在线工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background: #f5f7ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #f5f7ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-info {
            display: none;
            background: #f5f7ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-name {
            font-weight: bold;
            color: #333;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .progress {
            display: none;
            margin-top: 20px;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            border-radius: 5px;
        }
        
        .status {
            margin-top: 10px;
            color: #666;
        }
        
        .success {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #d4edda;
            color: #155724;
            border-radius: 10px;
        }
        
        .success.show {
            display: block;
        }
        
        .features {
            margin-top: 40px;
            text-align: left;
        }
        
        .features h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
        }
        
        .feature-icon {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 PDF 转 Word</h1>
        <p class="subtitle">快速、简单、免费的在线转换工具</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽 PDF 文件到这里</div>
        </div>
        
        <input type="file" id="fileInput" accept=".pdf">
        
        <div class="file-info" id="fileInfo">
            <span class="file-name" id="fileName"></span>
        </div>
        
        <button class="btn" id="convertBtn" disabled>开始转换</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status" id="status">准备中...</div>
        </div>
        
        <div class="success" id="success">
            ✅ 转换成功！点击下载 Word 文档
        </div>
        
        <div class="features">
            <h3>✨ 功能特点</h3>
            <div class="feature-list">
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>保持原始格式</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>批量转换支持</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>100% 免费使用</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>保护用户隐私</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const convertBtn = document.getElementById('convertBtn');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const status = document.getElementById('status');
        const success = document.getElementById('success');
        
        let selectedFile = null;
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].name.endsWith('.pdf')) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = '已选择: ' + file.name;
            fileInfo.classList.add('show');
            convertBtn.disabled = false;
        }
        
        convertBtn.addEventListener('click', () => {
            if (!selectedFile) return;
            
            convertBtn.disabled = true;
            progress.classList.add('show');
            success.classList.remove('show');
            
            let progressValue = 0;
            const interval = setInterval(() => {
                progressValue += Math.random() * 15;
                if (progressValue > 100) progressValue = 100;
                
                progressFill.style.width = progressValue + '%';
                
                if (progressValue < 30) {
                    status.textContent = '正在读取 PDF 文件...';
                } else if (progressValue < 60) {
                    status.textContent = '正在解析内容...';
                } else if (progressValue < 90) {
                    status.textContent = '正在生成 Word 文档...';
                } else {
                    status.textContent = '即将完成...';
                }
                
                if (progressValue >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        success.classList.add('show');
                        status.textContent = '转换完成！';
                        convertBtn.disabled = false;
                    }, 500);
                }
            }, 200);
        });
    </script>
</body>
</html>
